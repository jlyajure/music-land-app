<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSIC LAND PROJECT</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="MUSIC LAND PROJECT">
    <meta property="og:description" content="Tu rockola privada y catálogo musical exclusivo.">
    <meta property="og:image" itemprop="image" content="https://music-land-app-5kl2.vercel.app/logo.png">
    <meta property="og:image:width" content="800">
    <meta property="og:image:height" content="800">
    <meta property="og:site_name" content="Music Land">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MUSIC LAND PROJECT">
    <meta name="twitter:image" content="https://music-land-app-5kl2.vercel.app/logo.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <script src="https://widget.mixcloud.com/media/js/widgetApi.js"></script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; cursor:pointer;" onclick="window.triggerAdmin()">
        <div class="logo-box">
            <svg class="logo-svg" id="svg-respaldo" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            <img src="logo.jpg?v=100" class="header-logo" alt="ML" onload="document.getElementById('svg-respaldo').style.display='none'" onerror="this.src='logo.png'">
        </div>
        <div class="brand-title">MUSIC LAND PROJECT</div>
    </div>
    <div style="display:flex; gap: 8px;">
        <button onclick="window.confirmarSalida()" style="background:transparent; border:1px solid #ff4444; color:#ff4444; padding:5px 12px; border-radius:20px; cursor:pointer; font-weight:bold;">SALIR</button>
    </div>
</header>

<div id="modal-playlist">
    <div class="modal-pl-content">
        <h3 style="color:var(--neon); margin-top:0;">Guardar en Playlist</h3>
        <div id="pl-list" style="max-height:180px; overflow-y:auto; margin-bottom:15px; text-align: left;"></div>
        <input type="text" id="pl-new-name" placeholder="Nombre nueva lista..." style="width:100%; padding:12px; border-radius:12px; border:1px solid #444; background:#000; color:white; margin-bottom:10px; font-family: inherit;">
        <button onclick="window.crearPlaylist()" style="width:100%; padding:12px; background:var(--neon); color:black; font-weight:900; border:none; border-radius:12px; cursor:pointer;">➕ CREAR Y AGREGAR</button>
        <button onclick="document.getElementById('modal-playlist').style.display='none'" style="width:100%; padding:10px; background:transparent; color:#888; border:none; margin-top:15px; cursor:pointer; font-weight: bold;">Cancelar</button>
    </div>
</div>

<div id="admin-panel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; overflow-y:auto; padding:20px;">
    <div class="admin-box">
        <h2 style="color:var(--neon); text-align:center;">PANEL DIRECTOR 🛠️</h2>
        <input type="text" id="up-titulo" style="width:100%; background:#222; border:1px solid #444; color:white; padding:10px; margin-bottom:10px; border-radius:10px;" placeholder="Título">
        <input type="text" id="up-artista" style="width:100%; background:#222; border:1px solid #444; color:white; padding:10px; margin-bottom:10px; border-radius:10px;" placeholder="Artista">
        <input type="text" id="up-mp3-link" style="width:100%; background:#222; border:1px solid #444; color:white; padding:10px; margin-bottom:10px; border-radius:10px;" placeholder="Link MP3">
        <button onclick="window.subirCancion()" style="width:100%; background:var(--neon); color:black; font-weight:bold; padding:12px; border:none; border-radius:10px;">🚀 SUBIR</button>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; margin-top:10px; background:#333; color:white; border:none; padding:10px; border-radius:10px;">CERRAR</button>
    </div>
</div>

<div id="home-view">
    <div id="hero-section">
        <div id="hero-bg" class="hero-bg"></div>
        <div class="hero-content">
            <div id="hero-cover" class="hero-cover"></div>
            <div class="hero-info">
                <div id="hero-title" class="hero-title">...</div>
                <div id="hero-artist" class="hero-artist">...</div>
                <div id="hero-bio" class="hero-bio">Cargando la rockola...</div>
                <div class="hero-actions">
                    <button id="hero-play-btn" class="hero-btn-play"></button>
                    <button id="hero-fav-btn" style="background:none;border:none;font-size:35px;cursor:pointer;padding:0;transition:0.3s;">🤍</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="feed-container">
        <div id="seccion-playlists">
            <h3 id="title-play" style="margin-left:20px; display:none; color: var(--neon);">📁 Tus Playlists</h3>
            <div class="filter-scroll" id="carousel-play" style="display:none; margin-bottom:15px; padding-bottom: 5px;"></div>
        </div>

        <div class="filter-scroll" id="main-filters">
            <button class="filter-btn active" onclick="filtrar('Todo', this)">Todo</button>
            <button class="filter-btn" onclick="filtrar('Salsa', this)">Salsa</button>
            <button class="filter-btn" onclick="filtrar('Merengue', this)">Merengue</button>
            <button class="filter-btn" onclick="filtrar('Tropical', this)">Tropical</button>
            <button class="filter-btn" onclick="filtrar('Funk', this)">Funk</button>
            <button class="filter-btn" onclick="filtrar('Disco', this)">Disco</button>
            <button class="filter-btn" onclick="filtrar('RockEsp', this)">Rock Español</button>
            <button class="filter-btn" onclick="filtrar('BaladaEsp', this)">Baladas Español</button>
            <button class="filter-btn" onclick="filtrar('BaladaIng', this)">Baladas Inglés</button>
            <button class="filter-btn" onclick="filtrar('PopRock', this)">Pop/Rock</button>
            <button class="filter-btn" onclick="filtrar('Rancheras', this)">Rancheras</button>
            <button class="filter-btn" onclick="filtrar('Llanera', this)">Llanera</button>
            <button class="filter-btn" onclick="filtrar('Jazz', this)">Jazz</button>
            <button class="filter-btn" onclick="filtrar('Soul', this)">Soul</button>
            <button class="filter-btn" onclick="filtrar('Remixes', this)">Remixes</button>
            <button class="filter-btn" onclick="filtrar('Mix', this)">Mix</button>
            <button class="filter-btn" onclick="filtrar('Podcast', this)">Podcast</button>
            <button class="filter-btn" onclick="filtrar('IA', this)">I.A.</button>
            <button class="filter-btn" onclick="filtrar('Varios', this)">Varios</button>
        </div>

        <div id="secciones-extra">
            <h3 style="margin-left:20px; color: var(--neon);">💡 Sugerencias para ti</h3>
            <div id="carousel-sug" class="carousel"></div>
            <h3 id="title-fav" style="margin-left:20px; display:none; color: #ff4444;">❤️ Tus Favoritos</h3>
            <div id="carousel-fav" class="carousel" style="display:none;"></div>
            <h3 style="margin-left:20px;">🔥 Novedades</h3>
            <div id="carousel-new" class="carousel"></div>
        </div>
        
        <h3 id="titulo-catalogo" style="margin-left:20px;">📂 Catálogo Completo</h3>
        <div id="carousel-all" class="carousel" style="flex-wrap:wrap; justify-content:center;"></div>
    </div>
    <div style="font-size:10px; color:#555; text-align:center; margin-top:20px; padding-bottom:10px;">v12.2 - Tarjeta de Presentación VIP</div>
</div>

<audio id="main-media" preload="auto"></audio>

<div id="mini-player">
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #222;">
        <div id="mini-progress" style="height: 100%; width: 0%; background: var(--neon);"></div>
    </div>
    <div class="mini-main" onclick="window.openFullPlayer()">
        <div id="mini-art" class="mini-art"></div>
        <div style="margin-left:10px;">
            <div id="mini-title" style="font-size:14px; font-weight:bold; color:white;">...</div>
            <div id="mini-artist" style="font-size:11px; color:var(--neon);">...</div>
        </div>
    </div>
    <button onclick="window.toggleMainPlay()" id="mini-play-btn" class="btn-round" style="background:var(--neon); color:black; border:none;"></button>
</div>

<div id="full-player">
    <button onclick="window.closeFullPlayer()" class="btn-modern-down"><svg viewBox="0 0 24 24" width="24"><path fill="white" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg></button>
    <div id="fp-art" class="fp-art" style="margin-top:20px;"></div>
    <div id="fp-title" style="font-size:30px;font-weight:900;color:white; margin-top:20px; text-align:center;">...</div>
    <div id="fp-artist" style="font-size:18px;color:var(--neon);font-weight:700;margin-top:4px; text-align:center;">...</div>
    <div style="width: 100%; max-width: 350px; margin-top: 25px; display: flex; align-items: center; gap: 15px;">
        <span id="time-current" style="font-size: 13px;">0:00</span>
        <input type="range" id="seek-bar" value="0" min="0" step="1">
        <span id="time-total" style="font-size: 13px;">0:00</span>
    </div>
    <button onclick="window.toggleMainPlay()" id="fp-play-btn" class="btn-round" style="width:75px; height:75px; background:var(--neon); color:black; margin-top:30px;"></button>
</div>

<div id="pantalla-salida">
    <img src="logo.jpg" alt="Logo" style="width:120px; height:120px; border-radius:20px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.4); margin-bottom: 25px;" onerror="this.src='logo.png'">
    <h2 style="color:white; margin:0; font-size:28px;">Música Detenida</h2>
    <p style="color:var(--neon); margin-top:10px; font-size:18px;">¡Gracias por escuchar!</p>
    <button onclick="location.reload()" style="margin-top:40px; background:transparent; border:1px solid var(--neon); color:var(--neon); padding:10px 25px; border-radius:30px; cursor:pointer; font-weight:bold;">VOLVER A LA RADIO</button>
</div>

</body>
