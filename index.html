<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUSIC LAND PROJECT</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="MUSIC LAND PROJECT">
    <meta property="og:description" content="Tu rockola privada y catálogo musical exclusivo.">
    <meta property="og:image" itemprop="image" content="https://music-land-app-5kl2.vercel.app/logo.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="logo.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00d2ff; --bg: #080808; --card: #121212; --red: #ff4444; --yellow: #ffdd00; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: var(--bg); color: #e2e8f0; margin: 0; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; box-shadow: 0 0 15px var(--neon); border: 2px solid #000; }
        
        header { background: rgba(0,0,0,0.98); backdrop-filter: blur(10px); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 2000; border-bottom: 1px solid #222; height: 75px; }
        .logo-box { width: 45px; height: 45px; background: #000; border: 2px solid var(--neon); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); cursor: pointer; overflow: hidden; position: relative; flex-shrink: 0; }
        .brand-title { color: var(--neon); font-size: 20px; font-weight: 900; text-transform: uppercase; margin-left: 12px; letter-spacing: 1px; }

        #home-view { padding-top: 130px; padding-bottom: 150px; }
        
        #hero-section { min-height: 480px; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 0 0 40px 40px; border-bottom: 1px solid #222; background: #000; }
        .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(60px) brightness(0.2); }
        .hero-content { position: relative; z-index: 2; width: 90%; max-width: 1000px; display: flex; flex-direction: row; align-items: center; gap: 50px; padding: 20px; }
        .hero-cover { width: 280px; height: 280px; border-radius: 20px; background-size: cover; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .hero-title { font-size: 40px; font-weight: 900; color: white; margin: 0; }
        .hero-artist { color: var(--neon); font-size: 22px; font-weight: 700; margin: 10px 0; }
        .hero-bio { font-size: 15px; color: #ccc; line-height: 1.6; margin-top: 15px; border-left: 3px solid var(--neon); padding-left: 15px; }
        .hero-btn-play { background: var(--neon); border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--neon); color: black; }

        .filter-scroll { display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px; margin-bottom: 20px; scrollbar-width: none; }
        .filter-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: var(--neon); color: black; border-color: var(--neon); }

        .carousel { display: flex; overflow-x: auto; padding: 0 20px 30px 20px; gap: 20px; max-width: 1100px; margin: 0 auto; }
        .n-card { min-width: 155px; cursor: pointer; transition: 0.3s; position: relative; }
        .n-img { width: 155px; height: 155px; border-radius: 15px; background-size: cover; background-position: center; border: 1px solid #222; position: relative; }
        .n-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; border-radius: 15px; }
        .n-card:hover .n-overlay { opacity: 1; }
        
        .btn-fav-card { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; z-index: 3; color: white; }
        .btn-add-list { position: absolute; top: 8px; right: 45px; background: rgba(0,0,0,0.7); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; z-index: 3; color: white; }

        #mini-player { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5,5,5,0.98); backdrop-filter: blur(20px); border-top: 1px solid #222; padding: 12px 40px; display: none; z-index: 5000; align-items: center; justify-content: space-between; }
        .mini-art { width: 50px; height: 50px; border-radius: 8px; background-size: cover; }
        .btn-round { background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.2); color: white; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a, #000); z-index: 6000; transition: 0.4s; display: flex; flex-direction: column; padding: 40px; align-items: center; overflow-y: auto; }
        #full-player.active { top: 0; }
        .fp-art { width: 300px; height: 300px; border-radius: 30px; background-size: cover; box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 2px solid #333; }
        .fp-btn-main { width: 85px; height: 85px; border-radius: 50%; background: var(--neon); border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px var(--neon); color: black; }
        
        #seek-bar { width: 100%; max-width: 350px; -webkit-appearance: none; background: #333; height: 6px; border-radius: 5px; margin: 20px 0; }
        #seek-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--neon); border-radius: 50%; }

        .btn-wa { position: fixed; bottom: 95px; right: 25px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 4000; text-decoration: none; box-shadow: 0 0 20px rgba(37,211,102,0.4); }

        @media (max-width: 768px) {
            .hero-content { flex-direction: column; text-align: center; gap: 20px; }
            .hero-cover { width: 220px; height: 220px; }
            .fp-art { width: 260px; height: 260px; }
        }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; cursor:pointer;" onclick="window.triggerAdmin()">
        <div class="logo-box"><img src="logo.jpg" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
        <div class="brand-title">MUSIC LAND PROJECT</div>
    </div>
    <button onclick="window.confirmarSalida()" style="background:transparent; border:1px solid #ff4444; color:#ff4444; padding:5px 15px; border-radius:20px;">SALIR</button>
</header>

<div id="home-view">
    <div id="hero-section">
        <div id="hero-bg" class="hero-bg"></div>
        <div class="hero-content">
            <div id="hero-cover" class="hero-cover"></div>
            <div class="hero-info">
                <div id="hero-title" class="hero-title">...</div>
                <div id="hero-artist" class="hero-artist">...</div>
                <div id="hero-bio" class="hero-bio">Cargando...</div>
                <div class="hero-actions">
                    <button id="hero-play-btn" class="hero-btn-play"></button>
                    <button id="hero-fav-btn" style="background:none;border:none;font-size:35px;">🤍</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="feed-container">
        <div class="filter-scroll" id="main-filters">
            <button class="filter-btn active" onclick="filtrar('Todo', this)">Todo</button>
            <button class="filter-btn" onclick="filtrar('Salsa', this)">Salsa</button>
            <button class="filter-btn" onclick="filtrar('Merengue', this)">Merengue</button>
            <button class="filter-btn" onclick="filtrar('Varios', this)">Varios</button>
        </div>
        <h3 style="margin-left:20px;">📂 Catálogo Completo</h3>
        <div id="carousel-all" class="carousel" style="flex-wrap:wrap; justify-content:center;"></div>
    </div>
</div>

<audio id="main-media"></audio>

<div id="mini-player">
    <div class="mini-main" onclick="window.openFullPlayer()">
        <div id="mini-art" class="mini-art"></div>
        <div style="margin-left:10px;">
            <div id="mini-title" style="font-size:14px; font-weight:bold; color:white;">...</div>
            <div id="mini-artist" style="font-size:11px; color:var(--neon);">...</div>
        </div>
    </div>
    <button onclick="window.toggleMainPlay()" id="mini-play-btn" class="btn-round" style="background:var(--neon); color:black; border:none;"></button>
</div>

<div id="full-player">
    <button onclick="window.closeFullPlayer()" style="align-self:flex-start; background:none; border:none; color:white; font-size:30px;">✕</button>
    <div id="fp-art" class="fp-art"></div>
    <h2 id="fp-title" style="margin-top:20px; color:white; text-align:center;">...</h2>
    <h3 id="fp-artist" style="color:var(--neon); text-align:center;">...</h3>
    <input type="range" id="seek-bar" value="0">
    <button onclick="window.toggleMainPlay()" id="fp-play-btn" class="fp-btn-main"></button>
</div>

<a href="https://wa.me/584125852879" target="_blank" class="btn-wa">

</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBwBq4gLgv4DSfUidzUuC7Irmvj_4pCTtI", authDomain: "familia-yajure-app.firebaseapp.com", projectId: "familia-yajure-app", storageBucket: "familia-yajure-app.firebasestorage.app", messagingSenderId: "692035727386", appId: "1:692035727386:web:dfa3e39a481d56368a61a3" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const media = document.getElementById('main-media');
    let canciones = []; let idActual = null; let perfilData = null;

    const SVG_PLAY = `<svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
    const SVG_PAUSE = `<svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

    // 🔥 LA FUNCIÓN QUE ROMPE EL BLOQUEO 🔥
    window.gestionarPlay = (id) => {
        let s = canciones.find(c => c.id === id) || (id === 'PERFIL_MAIN' ? perfilData : null);
        if(!s) return;

        if(idActual !== id) {
            idActual = id;
            document.getElementById('mini-title').innerText = s.titulo;
            document.getElementById('mini-artist').innerText = s.artista;
            document.getElementById('mini-art').style.backgroundImage = `url('${s.imagenUrl}')`;
            document.getElementById('mini-player').style.display = 'flex';
            document.getElementById('fp-title').innerText = s.titulo;
            document.getElementById('fp-artist').innerText = s.artista;
            document.getElementById('fp-art').style.backgroundImage = `url('${s.imagenUrl}')`;

            // IMPORTANTE: Matar el proceso anterior
            media.pause();
            media.src = "";
            media.load();
            
            // Cargar de nuevo
            media.src = s.mp3Url;
            media.play().catch(e => {
                console.log("Reintentando...");
                setTimeout(() => media.play(), 500);
            });
        } else {
            window.toggleMainPlay();
        }
        actualizarUI();
    };

    window.toggleMainPlay = () => { media.paused ? media.play() : media.pause(); actualizarUI(); };

    function actualizarUI() {
        const icon = media.paused ? SVG_PLAY : SVG_PAUSE;
        document.getElementById('mini-play-btn').innerHTML = icon;
        document.getElementById('fp-play-btn').innerHTML = icon;
        document.getElementById('hero-play-btn').innerHTML = icon;
    }

    onSnapshot(query(collection(db, "musicland_canciones")), (snap) => {
        canciones = []; perfilData = null;
        snap.forEach(d => {
            if(d.id === "PERFIL_MAIN") perfilData = d.data();
            else canciones.push({id: d.id, ...d.data()});
        });
        renderFeeds();
    });

    function renderFeeds() {
        if(perfilData) {
            document.getElementById('hero-bg').style.backgroundImage = `url('${perfilData.imagenUrl}')`;
            document.getElementById('hero-cover').style.backgroundImage = `url('${perfilData.imagenUrl}')`;
            document.getElementById('hero-title').innerText = perfilData.titulo;
            document.getElementById('hero-artist').innerText = perfilData.artista;
            document.getElementById('hero-bio').innerText = perfilData.bio || "Bienvenidos.";
            document.getElementById('hero-play-btn').innerHTML = SVG_PLAY;
            document.getElementById('hero-play-btn').onclick = () => window.gestionarPlay('PERFIL_MAIN');
        }
        document.getElementById('carousel-all').innerHTML = canciones.map(c => `
            <div class="n-card" onclick="window.gestionarPlay('${c.id}')">
                <div class="n-img" style="background-image:url('${c.imagenUrl}')">
                    <div class="n-overlay">${SVG_PLAY}</div>
                </div>
                <div style="font-size:13px; font-weight:bold; margin-top:5px; text-align:center;">${c.titulo}</div>
            </div>
        `).join('');
    }

    media.addEventListener('timeupdate', () => {
        document.getElementById('seek-bar').value = (media.currentTime / media.duration) * 100 || 0;
        document.getElementById('mini-progress').style.width = (media.currentTime / media.duration) * 100 + "%";
    });

    window.openFullPlayer = () => document.getElementById('full-player').classList.add('active');
    window.closeFullPlayer = () => document.getElementById('full-player').classList.remove('active');
    window.confirmarSalida = () => { if(confirm("¿Salir?")) location.reload(); };
    window.triggerAdmin = () => { if(prompt("Clave:") === "ticoadmin2026") alert("Modo Admin listo (sube desde el otro index)"); };
</script>
</body>
</html>
